---
- name: Prepare
  become: true
  gather_facts: false
- name: Prepare
  hosts: all
  pre_tasks:
    - name: Find EXTERNALLY-MANAGED files
      ansible.builtin.find:
        paths: /usr/lib
        patterns: "EXTERNALLY-MANAGED"
        recurse: true
      register: externally_managed_files

    - name: Remove EXTERNALLY-MANAGED files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ externally_managed_files.files }}"

  roles:
    - role: buluma.bootstrap
    - role: buluma.epel
    - role: buluma.repo_epel
      when:
        - (ansible_facts['distribution'] == "Amazon" and ansible_facts['distribution_major_version'] == "2") or (ansible_facts['os_family'] == "RedHat" and
          ansible_facts['distribution_major_version'] in [ "7", "8" ])
